name: Cron - Fetch notices & Parse schedules

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  fetch-notices:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch notices
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://afreecanotice.vercel.app/api/cron/fetch-notices"

  parse-hot:
    runs-on: ubuntu-latest
    needs: fetch-notices
    steps:
      - name: Parse schedules
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://afreecanotice.vercel.app/api/cron/parse-hot"
