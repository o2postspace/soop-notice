<div class="app-wrap">

<header>
  <h1><img src="/logo.png" alt="숲공지"></h1>
  <div class="header-right">
    <div class="auto-refresh">
      자동갱신
      <select id="intervalSelect">
        <option value="0">끄기</option>
        <option value="30">30초</option>
        <option value="60" selected>1분</option>
        <option value="180">3분</option>
      </select>
    </div>
    <span id="lastUpdate"></span>
    <button id="refreshBtn" onclick="loadAll()">새로고침</button>
    <button onclick="openFeedback()" style="background:#a29bfe;color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;">건의</button>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="notices" onclick="switchTab('notices')">공지</button>
  <button class="tab-btn" data-tab="calendar" onclick="switchTab('calendar')">캘린더</button>
</div>

<div class="filter-bar" id="filterBar">
  <span class="label">필터</span>
  <button class="filter-btn active" data-filter="popular" onclick="setFilter('popular')">인기</button>
  <button class="filter-btn" data-filter="all" onclick="setFilter('all')">전체</button>
  <button class="filter-btn" data-filter="fav" onclick="setFilter('fav')">본진</button>
  <div class="divider"></div>
  <button class="edit-fav-btn" onclick="openModal()">본진 설정</button>
  <div class="search-box">
    <input id="searchInput" type="text" placeholder="검색 (제목, 내용, BJ)" oninput="onSearch()" onkeydown="if(event.key==='Escape'){this.value='';onSearch();}">
    <button class="search-clear" onclick="document.getElementById('searchInput').value='';onSearch();">X</button>
  </div>
</div>

<div class="page-scroller" id="scroller">
  <div id="container">
    <div class="loading">
      <div class="spinner"></div> 불러오는 중...
    </div>
  </div>
</div>

<div id="calendarContainer" style="display:none;">
  <div class="cal-daily">
    <div class="cal-left">
      <div class="calendar-nav">
        <button onclick="changeDay(-1)">&#9664; 이전</button>
        <span id="calDateLabel"></span>
        <button onclick="changeDay(0)" style="font-size:11px;background:#a29bfe;">오늘</button>
        <button onclick="changeDay(1)">다음 &#9654;</button>
      </div>
      <div class="cal-index" id="calIndex"></div>
    </div>
    <div class="cal-content" id="calContent"></div>
  </div>
</div>

</div><!-- app-wrap -->

<div class="toast" id="toast"></div>

<!-- 쇼츠 스타일 페이지 네비게이션 -->
<div class="scroll-nav" id="scrollNav" style="display:none;">
  <button onclick="goToTop()" title="맨 위로" style="font-size:14px;">TOP</button>
  <button id="btnPrev" onclick="goPage(-1)" title="이전 페이지">&#9650;</button>
  <div class="nav-counter" id="navCounter"></div>
  <button id="btnNext" onclick="goPage(1)" title="다음 페이지">&#9660;</button>
</div>

<!-- 본진 설정 모달 -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-top">
      <h3>본진 BJ 설정</h3>
      <button class="modal-close" onclick="closeModal()">X</button>
    </div>
    <div class="modal-body">
      <div class="modal-left">
        <div class="modal-search">
          <input type="text" id="modalSearchInput" placeholder="BJ 이름 검색..." oninput="filterModalList()">
        </div>
        <div id="modalList"></div>
      </div>
      <div class="modal-right">
        <div class="modal-right-header">내 본진 <span id="favCount">0</span></div>
        <div id="favList"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-save" id="btnSave" onclick="saveFav()">저장</button>
    </div>
  </div>
</div>

<!-- 건의사항 모달 -->
<div class="modal-bg" id="feedbackBg">
  <div class="modal" style="max-width:400px;">
    <div class="modal-top">
      <h3>건의 / 문의</h3>
      <button class="modal-close" onclick="closeFeedback()">X</button>
    </div>
    <input id="fbSubject" type="text" placeholder="제목" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;margin-bottom:8px;">
    <textarea id="fbBody" placeholder="내용을 입력하세요" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;min-height:120px;resize:vertical;margin-bottom:12px;"></textarea>
    <button onclick="sendFeedback()" style="width:100%;padding:10px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;background:#5B6AED;color:#fff;">보내기</button>
    <p style="font-size:11px;color:#999;text-align:center;margin-top:10px;">문의/건의사항은 <a href="mailto:soopnotice@gmail.com" style="color:#5B6AED;">soopnotice@gmail.com</a> 으로도 보내실 수 있습니다.</p>
  </div>
</div>

<!-- 공지 상세보기 모달 -->
<div class="detail-bg" id="detailBg">

    </div>
  </div>
</div>

// DB에 KST가 +00:00으로 저장되어 있으므로 UTC 기준으로 계산
function parseKST(dateStr) {
  // +00:00을 제거하고 KST로 해석
  const cleaned = dateStr.replace(/[+-]\d{2}:\d{2}$/, '').replace('T', ' ');
  // "YYYY-MM-DD HH:MM:SS"를 KST로 파싱
  return new Date(cleaned + '+09:00');
}

function timeAgo(dateStr) {
  const diff = Date.now() - parseKST(dateStr).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return "방금";
  if (m < 60) return m + "분 전";
  const h = Math.floor(m / 60);
  if (h < 24) return h + "시간 전";
  const d = Math.floor(h / 24);
  return d + "일 전";
}

function formatDate(dateStr) {
  const d = parseKST(dateStr);
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return mm+'.'+dd+' '+hh+':'+mi;
}

function isNew(dateStr) {

}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function sanitizeHtml(html) {
  if (!html) return "";
  return html
    .replace(/<script[\s\S]*?<\/script>/gi, "")
    .replace(/\s+on\w+\s*=\s*("[^"]*"|'[^']*'|[^\s>]*)/gi, "")
    .replace(/href\s*=\s*["']javascript:[^"']*["']/gi, 'href="#"')
    .replace(/src\s*=\s*["']data:(?!image\/)[^"']*["']/gi, 'src=""')
    .replace(/<iframe[\s\S]*?<\/iframe>/gi, "")
    .replace(/<(object|embed|form|input|button|textarea|select)[\s\S]*?<\/\1>/gi, "")
    .replace(/<(object|embed|form|input|button|textarea|select)[^>]*\/?>/gi, "")
    .replace(/expression\s*\([^)]*\)/gi, "")
    .replace(/style\s*=\s*["'][^"']*url\s*\([^)]*\)[^"']*["']/gi, "");
}

function optimizeImages(html) {
  if (!html) return "";
  return html
    .replace(/src="(https?:\/\/[^"]+\.(?:jpg|jpeg|png|webp|gif)[^"]*)"/gi, function(match, url) {
      var proxy = 'https://wsrv.nl/?url=' + encodeURIComponent(url) + '&w=400&output=webp&q=75';
      return 'src="' + proxy + '" data-full="' + url + '"';
    })
    .replace(/<img(?![^>]*loading)/gi, '<img loading="lazy"');
}

function isLargeContent(html) {

  if (imgCount >= 2) return true;
  // 큰 이미지가 포함된 경우 (width 속성이 크거나 style에 큰 값)

}

function getFilteredNotices(data) {
  let list = data.map(r => ({
    bjId: r.bj_id || r.bjId,
    name: r.bj_name || r.name,
    notice: r,
  }));

  if (currentFilter === 'fav') list = list.filter(x => favorites.includes(x.bjId));
  else if (currentFilter === 'popular') list = list.filter(x => (x.notice.read_cnt || 0) >= 1000);

  // 검색 필터
  const query = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  if (query) {
    list = list.filter(x => {

      const body = (n.content_html || n.contentHtml || '').replace(/<[^>]+>/g, ' ').toLowerCase();
      const bj = (x.name || '').toLowerCase();
      return title.includes(query) || body.includes(query) || bj.includes(query);

  }
  return list;
}

// 4열 × 1행 고정 패킹 (가로 우선 배치)
function packIntoPages(notices) {
  const w = window.innerWidth;
  const cols = w <= 700 ? 1 : w <= 1200 ? 2 : 4;
  const maxRows = 1;
  const pages = [];
  let i = 0;

  while (i < notices.length) {
    const indices = [];
    let rows = 0;

    while (i < notices.length && rows < maxRows) {
      // 한 행에 4칸 채우기
      let colsUsed = 0;
      while (i < notices.length && colsUsed < cols) {
        if (colsUsed + 1 > cols) break;
        indices.push(i);
        colsUsed += 1;
        i++;
      }
      rows++;
    }

    pages.push(indices);
  }
  return pages;
}

// 페이지 단위로 렌더링
function renderPages(data) {
  filteredNotices = getFilteredNotices(data);
  const container = document.getElementById('container');

  if (filteredNotices.length === 0) {
    container.innerHTML = '<div class="page active"><div class="empty-msg">공지가 없습니다</div></div>';
    document.getElementById('scrollNav').style.display = 'none';
    packedPages = [];
    totalPages = 0;
    return;
  }

  // 화면 높이 기준 본문 최대 높이
  const scroller = document.getElementById('scroller');
  const bodyMax = Math.max(60, scroller.clientHeight - 170);
  document.documentElement.style.setProperty('--card-body-max', bodyMax + 'px');

  packedPages = packIntoPages(filteredNotices);
  totalPages = packedPages.length;
  currentPage = Math.min(currentPage, totalPages - 1);

  let html = '';
  for (let p = 0; p < totalPages; p++) {
    html += '<div class="page" data-page="' + p + '"><div class="page-inner">';
    for (const idx of packedPages[p]) {
      html += buildCardHtml(filteredNotices[idx]);
    }
    html += '</div></div>';
  }
  container.innerHTML = html;
  container.querySelectorAll('.card-body').forEach(b => neutralizeEmoticonLinks(b));

  // 긴 본문에만 "더보기" 버튼 표시
  container.querySelectorAll('.card-body').forEach(body => {
    if (body.scrollHeight > body.clientHeight + 10) {
      const btn = body.nextElementSibling;
      if (btn && btn.classList.contains('card-expand-btn')) btn.classList.add('visible');
    }
  });

  showCurrentPage();
  if (currentTab === 'notices') {
    document.getElementById('scrollNav').style.display = 'flex';
  }
}

function goToTop() {

function goPage(dir) {
  // 백그라운드 데이터 반영
  filteredNotices = getFilteredNotices(prevData);
  packedPages = packIntoPages(filteredNotices);
  totalPages = packedPages.length;

  const next = currentPage + dir;
  if (next < 0 || next >= totalPages) return;
  currentPage = next;

  // 해당 페이지가 DOM에 없으면 추가
  const existing = document.querySelector('#container .page[data-page="' + next + '"]');
  if (!existing) {
    const scroller = document.getElementById('scroller');
    const pageH = scroller.clientHeight;
    const bodyMax = Math.max(60, pageH - 40 - 130);
    let html = '<div class="page" data-page="' + next + '"><div class="page-inner">';
    for (const idx of packedPages[next]) {
      html += buildCardHtml(filteredNotices[idx]);
    }
    html += '</div></div>';
    document.getElementById('container').insertAdjacentHTML('beforeend', html);

    const newPage = document.querySelector('#container .page[data-page="' + next + '"]');
    newPage.querySelectorAll('.card-body').forEach(body => {
      if (body.scrollHeight > body.clientHeight + 10) {
        const btn = body.nextElementSibling;
        if (btn && btn.classList.contains('card-expand-btn')) btn.classList.add('visible');
      }
    });
  }

  showCurrentPage();
}

function showCurrentPage() {
  const pages = document.querySelectorAll('#container .page');
  pages.forEach((p, i) => {
    p.classList.toggle('active', i === currentPage);
  });
  updateNav();
}

function updateNav() {
  document.getElementById('navCounter').textContent = (currentPage + 1) + ' / ' + totalPages;
  document.getElementById('btnPrev').disabled = (currentPage <= 0);
  document.getElementById('btnNext').disabled = (currentPage >= totalPages - 1);
}

// 키보드: 위/아래, j/k, PageUp/PageDown
document.addEventListener('keydown', (e) => {
  if (document.getElementById('modalBg').classList.contains('show')) return;
  if (document.getElementById('detailBg').classList.contains('show')) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;

  // 캘린더 탭일 때 방향키로 다음/이전 BJ 공지로 이동
  if (currentTab === 'calendar') {
    const active = document.querySelector('.cal-index-item.active');
    const idx = active ? parseInt(active.dataset.idx) : -1;
    if (e.key === 'ArrowDown' || e.key === 'j') {
      e.preventDefault();
      const nextIdx = idx + 1;
      if (document.querySelector('.cal-index-item[data-idx="' + nextIdx + '"]')) scrollToNotice(nextIdx);
    } else if (e.key === 'ArrowUp' || e.key === 'k') {
      e.preventDefault();
      const prevIdx = idx - 1;
      if (prevIdx >= 0 && document.querySelector('.cal-index-item[data-idx="' + prevIdx + '"]')) scrollToNotice(prevIdx);
    }
    return;
  }

  if (e.key === 'j' || e.key === 'ArrowDown' || e.key === 'PageDown' || e.key === ' ') {
    e.preventDefault();
    goPage(1);
  } else if (e.key === 'k' || e.key === 'ArrowUp' || e.key === 'PageUp') {
    e.preventDefault();
    goPage(-1);
  } else if (e.key === 'Home') {
    e.preventDefault();
    currentPage = 0;
    showCurrentPage();
  } else if (e.key === 'End') {
    e.preventDefault();
    currentPage = totalPages - 1;
    showCurrentPage();
  }
});

// 터치 스와이프로 페이지 전환 (모바일)
(function() {
  let startY = 0;
  let startTime = 0;
  document.addEventListener('touchstart', (e) => {
    if (document.getElementById('modalBg').classList.contains('show')) return;
    if (document.getElementById('detailBg').classList.contains('show')) return;
    startY = e.touches[0].clientY;
    startTime = Date.now();
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    if (document.getElementById('modalBg').classList.contains('show')) return;
    if (document.getElementById('detailBg').classList.contains('show')) return;
    const diffY = startY - e.changedTouches[0].clientY;
    const diffTime = Date.now() - startTime;
    if (diffTime > 500 || Math.abs(diffY) < 50) return;
    if (diffY > 0) goPage(1);   // 위로 스와이프 → 다음
    else goPage(-1);             // 아래로 스와이프 → 이전
  }, { passive: true });
})();

function scrollToNotice(index) {
  scrollLock = true;
  const container = document.getElementById('calContent');
  const el = document.getElementById('cal-notice-' + index);
  if (el && container) {
    container.scrollTop = el.offsetTop - container.offsetTop;
  }

  // 인덱스 하이라이트
  document.querySelectorAll('.cal-index-item').forEach(item => item.classList.remove('active'));
  const idxItem = document.querySelector('.cal-index-item[data-idx="' + index + '"]');
  if (idxItem) {
    idxItem.scrollIntoView({ behavior: 'auto', block: 'nearest', inline: 'nearest' });
  }
  setTimeout(() => { scrollLock = false; }, 100);

function onCalContentScroll() {
  if (scrollLock) return;
  const content = document.getElementById('calContent');
  const notices = content.querySelectorAll('.cal-notice');
  const contentRect = content.getBoundingClientRect();
  let activeIdx = 0;

  // 스크롤이 바닥이면 마지막 항목 active
  if (content.scrollTop + content.clientHeight >= content.scrollHeight - 10) {
    activeIdx = notices.length - 1;
  } else {
    notices.forEach((n, i) => {
      const rect = n.getBoundingClientRect();
      if (rect.top <= contentRect.top + contentRect.height / 3) activeIdx = i;
    });
  }

  document.querySelectorAll('.cal-index-item').forEach((item, i) => {
    item.classList.toggle('active', i === activeIdx);
  });
  const activeItem = document.querySelector('.cal-index-item[data-idx="' + activeIdx + '"]');
  if (activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
}

  const allIds = [...new Set([...liveLinks].map(el => el.dataset.bjid))];
  const popular = allIds.filter(id => POPULAR_IDS.includes(id));
  const others = allIds.filter(id => !POPULAR_IDS.includes(id));

  function applyResults(data) {
    liveLinks.forEach(el => {
      if (data[el.dataset.bjid] !== undefined) el.classList.toggle('is-live', data[el.dataset.bjid]);
    });
  }

  // 인기 BJ 먼저 빠르게
  if (popular.length > 0) {
    try {
      const resp = await fetch('/api/live-check?ids=' + popular.join(','));
      applyResults(await resp.json());
    } catch(e) {}
  }
  // 나머지 백그라운드
  if (others.length > 0) {
    try {
      const resp = await fetch('/api/live-check?ids=' + others.join(','));
      applyResults(await resp.json());
    } catch(e) {}
  }
}

// 30초마다 라이브 체크
setInterval(checkLiveStatus, 30000);

loadAll();
setupAutoRefresh();

// Pull-to-refresh (모바일 맨 위에서 아래로 당기기)
(function() {
  var ptrStartY = 0;
  var ptrTriggered = false;
  document.addEventListener('touchstart', function(e) {
    if (window.scrollY === 0 && currentTab === 'notices' && !document.getElementById('detailBg').classList.contains('show')) {
      ptrStartY = e.touches[0].clientY;
      ptrTriggered = false;
    } else {
      ptrStartY = 0;
    }
  }, {passive: true});
  document.addEventListener('touchmove', function(e) {
    if (!ptrStartY) return;
    var dy = e.touches[0].clientY - ptrStartY;
    if (dy > window.innerHeight * 0.5 && !ptrTriggered) {
      ptrTriggered = true;
      location.reload();
    }
  }, {passive: true});
})();
</script>
</body>
